<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<title>ROVER CTRL · micro:bit</title>
<meta name="theme-color" content="#12181a">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="brand">
    <div class="title">ROVER CTRL</div>
    <div class="sub">MICRO:BIT · BLE UART</div>
  </div>
  <button id="connectBtn"><span class="dot"></span><span id="connectLabel">CONECTAR</span></button>
</header>

<div id="telemetry">
  <span>CMD: <span class="val" id="lastCmd">--</span></span>
  <span>ORIGEN: <span class="val" id="lastSource">--</span></span>
</div>

<main>
  <div id="stickWrap">
    <div id="stickBase"></div>
    <svg id="dial" viewBox="0 0 300 300">
      <circle class="dial-ring" cx="150" cy="150" r="128"/>
      <circle class="dial-ring" cx="150" cy="150" r="108"/>
      <text id="lblF" class="dial-label" x="150" y="26" text-anchor="middle">ADELANTE</text>
      <text id="lblB" class="dial-label" x="150" y="282" text-anchor="middle">ATRAS</text>
      <text id="lblL" class="dial-label" x="30" y="155" text-anchor="middle">IZQ</text>
      <text id="lblR" class="dial-label" x="270" y="155" text-anchor="middle">DER</text>
    </svg>
    <div id="stickKnob"></div>
  </div>

  <div id="rightPanel">
    <div id="auxRow">
      <div class="auxBtn" id="aux1">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="#7c8d8e" stroke-width="2"><path d="M5 13l4 4L19 7"/></svg>
        <span class="lbl">AUX 1</span>
        <span class="key">A · CHECK</span>
      </div>
      <div class="auxBtn" id="aux2">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="#7c8d8e" stroke-width="2"><path d="M12 2l2.6 6.6L21 10l-5 4.4L17.4 21 12 17.5 6.6 21 8 14.4 3 10l6.4-1.4z"/></svg>
        <span class="lbl">AUX 2</span>
        <span class="key">B · ESTRELLA</span>
      </div>
    </div>

    <div id="padStatus"><span class="dot"></span><span id="padLabel">SIN MANDO USB-C</span></div>
  </div>
</main>

<footer>FLECHAS = TECLADO &nbsp;·&nbsp; STICK IZQ DEL MANDO = MOVIMIENTO</footer>

<div id="toast"></div>

<div id="debugPanel">
  <div id="debugHeader">LOG <span id="debugToggle">▾</span></div>
  <div id="debugLog"></div>
</div>

<script src="app.js"></script>
</body>
</html>
