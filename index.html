<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<title>ROVER CTRL · micro:bit</title>
<style>
  :root{
    --bg:#12181a;
    --panel:#1b2426;
    --panel-2:#212c2e;
    --line:#2c393c;
    --accent:#ff8c1a;
    --accent-dim:#7a4b1a;
    --ok:#3ddc97;
    --danger:#ff4d4d;
    --text:#e8ecec;
    --muted:#7c8d8e;
    --mono: "JetBrains Mono","Space Mono",ui-monospace,Consolas,monospace;
    --sans: -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{
    margin:0; padding:0; height:100%; background:var(--bg); color:var(--text);
    font-family:var(--sans); overscroll-behavior:none; touch-action:none;
  }
  body{
    display:flex; flex-direction:column;
    min-height:100vh; min-height:100dvh;
    padding: max(14px, env(safe-area-inset-top)) 16px max(14px, env(safe-area-inset-bottom));
  }

  /* ---------- Top bar ---------- */
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding-bottom:12px; border-bottom:1px solid var(--line);
  }
  .brand{display:flex; flex-direction:column; line-height:1.05;}
  .brand .title{font-family:var(--mono); font-weight:700; font-size:15px; letter-spacing:3px; color:var(--text);}
  .brand .sub{font-family:var(--mono); font-size:10px; letter-spacing:2px; color:var(--muted); margin-top:3px;}

  #connectBtn{
    display:flex; align-items:center; gap:8px;
    background:var(--panel); border:1px solid var(--line); color:var(--text);
    font-family:var(--mono); font-size:11px; letter-spacing:1.5px;
    padding:9px 14px; border-radius:8px; cursor:pointer;
  }
  #connectBtn .dot{width:8px; height:8px; border-radius:50%; background:var(--danger); box-shadow:0 0 8px var(--danger);}
  #connectBtn.connected .dot{background:var(--ok); box-shadow:0 0 8px var(--ok);}
  #connectBtn.connected{border-color: rgba(61,220,151,.4);}

  /* ---------- Telemetry strip ---------- */
  #telemetry{
    font-family:var(--mono); font-size:11px; color:var(--muted);
    padding:8px 2px 2px; letter-spacing:.5px; display:flex; justify-content:space-between;
  }
  #telemetry .val{color:var(--accent);}

  main{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px;
    padding: 10px 0 4px;
  }

  /* ---------- Joystick (compass dial) ---------- */
  #stickWrap{ position:relative; width:min(72vw, 300px); height:min(72vw, 300px); }
  svg#dial{ position:absolute; inset:0; width:100%; height:100%; }
  .tick{ stroke:var(--line); stroke-width:2; }
  .tick.major{ stroke:var(--muted); }
  .dial-ring{ fill:none; stroke:var(--line); stroke-width:1.5; }
  .dial-label{
    font-family:var(--mono); font-size:11px; fill:var(--muted); letter-spacing:2px;
  }
  .dial-label.active{ fill:var(--accent); }

  #stickBase{
    position:absolute; inset:0; border-radius:50%;
    background: radial-gradient(circle at 50% 42%, var(--panel-2), var(--panel) 70%);
    border:1px solid var(--line);
  }
  #stickSweep{
    position:absolute; inset:0; border-radius:50%; pointer-events:none;
    opacity:0; transition:opacity .3s;
  }
  #stickWrap.live #stickSweep{ opacity:1; }
  #stickKnob{
    position:absolute; width:34%; height:34%; left:33%; top:33%;
    border-radius:50%;
    background: linear-gradient(160deg, #2e3a3c, #17201f);
    border:1px solid var(--line);
    box-shadow: 0 6px 14px rgba(0,0,0,.4), inset 0 0 0 1px rgba(255,255,255,.02);
    transition: box-shadow .15s;
  }
  #stickWrap.active #stickKnob{
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(255,140,26,.12), 0 6px 14px rgba(0,0,0,.4);
  }

  /* ---------- Aux buttons ---------- */
  #auxRow{ display:flex; gap:16px; width:min(72vw,300px); }
  .auxBtn{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:8px;
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:14px 8px; cursor:pointer;
  }
  .auxBtn:active{ border-color:var(--accent); }
  .auxBtn .ico{ width:26px; height:26px; }
  .auxBtn .lbl{ font-family:var(--mono); font-size:10px; letter-spacing:1.5px; color:var(--muted); }
  .auxBtn .key{ font-family:var(--mono); font-size:9px; color:var(--accent-dim); }

  /* ---------- Gamepad status ---------- */
  #padStatus{
    display:flex; align-items:center; gap:8px; justify-content:center;
    font-family:var(--mono); font-size:10.5px; color:var(--muted); letter-spacing:1px;
    padding-top:2px;
  }
  #padStatus .dot{width:7px; height:7px; border-radius:50%; background:var(--line);}
  #padStatus.on .dot{background:var(--ok); box-shadow:0 0 6px var(--ok);}
  #padStatus.on{ color:var(--ok); }

  footer{
    font-family:var(--mono); font-size:9.5px; color:var(--muted); text-align:center;
    padding-top:10px; letter-spacing:1px; opacity:.7;
  }

  #toast{
    position:fixed; left:16px; right:16px; bottom:24px;
    background:#241414; border:1px solid var(--danger); color:#ffb3b3;
    font-family:var(--mono); font-size:12px; padding:10px 14px; border-radius:8px;
    transform:translateY(140%); transition:transform .25s ease; z-index:20;
  }
  #toast.show{ transform:translateY(0); }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="title">ROVER CTRL</div>
    <div class="sub">MICRO:BIT · BLE UART</div>
  </div>
  <button id="connectBtn"><span class="dot"></span><span id="connectLabel">CONECTAR</span></button>
</header>

<div id="telemetry">
  <span>CMD: <span class="val" id="lastCmd">--</span></span>
  <span>ORIGEN: <span class="val" id="lastSource">--</span></span>
</div>

<main>
  <div id="stickWrap">
    <div id="stickBase"></div>
    <svg id="dial" viewBox="0 0 300 300">
      <circle class="dial-ring" cx="150" cy="150" r="128"/>
      <circle class="dial-ring" cx="150" cy="150" r="108"/>
      <text id="lblF" class="dial-label" x="150" y="26" text-anchor="middle">ADELANTE</text>
      <text id="lblB" class="dial-label" x="150" y="282" text-anchor="middle">ATRAS</text>
      <text id="lblL" class="dial-label" x="30" y="155" text-anchor="middle">IZQ</text>
      <text id="lblR" class="dial-label" x="270" y="155" text-anchor="middle">DER</text>
    </svg>
    <div id="stickKnob"></div>
  </div>

  <div id="auxRow">
    <div class="auxBtn" id="aux1">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="#7c8d8e" stroke-width="2"><path d="M5 13l4 4L19 7"/></svg>
      <span class="lbl">AUX 1</span>
      <span class="key">A · CHECK</span>
    </div>
    <div class="auxBtn" id="aux2">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="#7c8d8e" stroke-width="2"><path d="M12 2l2.6 6.6L21 10l-5 4.4L17.4 21 12 17.5 6.6 21 8 14.4 3 10l6.4-1.4z"/></svg>
      <span class="lbl">AUX 2</span>
      <span class="key">B · ESTRELLA</span>
    </div>
  </div>

  <div id="padStatus"><span class="dot"></span><span id="padLabel">SIN MANDO USB-C</span></div>
</main>

<footer>FLECHAS = TECLADO &nbsp;·&nbsp; STICK IZQ DEL MANDO = MOVIMIENTO</footer>

<div id="toast"></div>

<script>
/* ============================================================
   ROVER CTRL
   App de control remoto para carro con micro:bit.
   Entradas soportadas:
     - Joystick táctil en pantalla
     - Teclado (flechas) para pruebas en escritorio
     - Gamepad GameSir X5 Lite (USB-C, modo Android HID) vía Gamepad API
   Salida: comandos cortos por Bluetooth Web (Nordic UART Service)
     F = adelante   B = atrás   L = izquierda   R = derecha   S = detener
     C = AUX 1 (check en la matriz)   X = AUX 2 (otro ícono)
   ============================================================ */

// ---------- Nordic UART Service UUIDs ----------
const UART_SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const UART_RX       = '6e400002-b5a3-f393-e0a9-e50e24dcca9e'; // escribimos aquí (RX del micro:bit)
const UART_TX       = '6e400003-b5a3-f393-e0a9-e50e24dcca9e'; // notificaciones del micro:bit (no usado por ahora)

let bleDevice = null, bleServer = null, rxChar = null;
let isConnected = false;

const connectBtn = document.getElementById('connectBtn');
const connectLabel = document.getElementById('connectLabel');
const lastCmdEl = document.getElementById('lastCmd');
const lastSourceEl = document.getElementById('lastSource');
const toastEl = document.getElementById('toast');

function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=> toastEl.classList.remove('show'), 3200);
}

async function connectBLE(){
  if(!navigator.bluetooth){
    showToast('Este navegador no soporta Web Bluetooth. Usa Chrome en Android.');
    return;
  }
  if(isConnected){
    try{ bleDevice.gatt.disconnect(); }catch(e){}
    return;
  }
  try{
    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [{ services: [UART_SERVICE] }],
      optionalServices: [UART_SERVICE]
    });
    bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
    bleServer = await bleDevice.gatt.connect();
    const service = await bleServer.getPrimaryService(UART_SERVICE);
    rxChar = await service.getCharacteristic(UART_RX);
    isConnected = true;
    connectBtn.classList.add('connected');
    connectLabel.textContent = 'CONECTADO';
  }catch(err){
    console.error(err);
    showToast('No se pudo conectar: ' + (err.message || err));
  }
}

function onDisconnected(){
  isConnected = false;
  rxChar = null;
  connectBtn.classList.remove('connected');
  connectLabel.textContent = 'CONECTAR';
  showToast('micro:bit desconectado');
}

connectBtn.addEventListener('click', connectBLE);

// Cola simple para no saturar la característica BLE con escrituras simultáneas
let writeBusy = false;
const writeQueue = [];
async function sendCommand(cmd, source){
  lastCmdEl.textContent = cmd;
  lastSourceEl.textContent = source;
  if(!isConnected || !rxChar) return;
  writeQueue.push(cmd);
  if(writeBusy) return;
  writeBusy = true;
  while(writeQueue.length){
    const c = writeQueue.shift();
    try{
      const data = new TextEncoder().encode(c + '\n');
      await rxChar.writeValueWithoutResponse ? rxChar.writeValueWithoutResponse(data) : rxChar.writeValue(data);
    }catch(e){
      console.warn('Fallo de escritura BLE', e);
      break;
    }
  }
  writeBusy = false;
}

// ============================================================
// JOYSTICK (táctil + gamepad, unificados)
// ============================================================
const stickWrap = document.getElementById('stickWrap');
const stickKnob = document.getElementById('stickKnob');
const labels = {
  F: document.getElementById('lblF'),
  B: document.getElementById('lblB'),
  L: document.getElementById('lblL'),
  R: document.getElementById('lblR'),
};

const DEAD_ZONE = 0.3;
let currentDir = 'S';       // dirección lógica actual (F/B/L/R/S)
let dragging = false;
let dragSource = 'PANTALLA';

function setKnobPosition(nx, ny){ // nx, ny en rango -1..1
  const wrap = stickWrap.getBoundingClientRect();
  const maxOffset = wrap.width * 0.32;
  const x = nx * maxOffset;
  const y = ny * maxOffset;
  stickKnob.style.transform = `translate(${x}px, ${y}px)`;
}

function highlightLabel(dir){
  Object.values(labels).forEach(l => l.classList.remove('active'));
  if(labels[dir]) labels[dir].classList.add('active');
}

function directionFromVector(nx, ny){
  // nx: -1(izq) .. 1(der)   ny: -1(adelante) .. 1(atrás)
  const mag = Math.hypot(nx, ny);
  if(mag < DEAD_ZONE) return 'S';
  if(Math.abs(ny) >= Math.abs(nx)){
    return ny < 0 ? 'F' : 'B';
  }else{
    return nx < 0 ? 'L' : 'R';
  }
}

function updateStick(nx, ny, source){
  const mag = Math.min(1, Math.hypot(nx, ny));
  const angle = Math.atan2(ny, nx);
  const clampedX = Math.cos(angle) * mag;
  const clampedY = Math.sin(angle) * mag;
  setKnobPosition(clampedX, clampedY);

  const dir = directionFromVector(nx, ny);
  stickWrap.classList.toggle('live', dir !== 'S');
  highlightLabel(dir);

  if(dir !== currentDir){
    currentDir = dir;
    dragSource = source;
    sendCommand(dir, source);
  }
}

function resetStick(source){
  setKnobPosition(0,0);
  stickWrap.classList.remove('live','active');
  highlightLabel(null);
  if(currentDir !== 'S'){
    currentDir = 'S';
    sendCommand('S', source);
  }
}

// --- Entrada táctil / mouse ---
function pointerPos(evt){
  const wrap = stickWrap.getBoundingClientRect();
  const cx = wrap.left + wrap.width/2;
  const cy = wrap.top + wrap.height/2;
  const px = (evt.touches ? evt.touches[0].clientX : evt.clientX);
  const py = (evt.touches ? evt.touches[0].clientY : evt.clientY);
  const radius = wrap.width/2;
  let nx = (px - cx) / radius;
  let ny = (py - cy) / radius;
  return {nx, ny};
}

function onPointerDown(evt){
  dragging = true;
  stickWrap.classList.add('active');
  const {nx, ny} = pointerPos(evt);
  updateStick(nx, ny, 'PANTALLA');
  evt.preventDefault();
}
function onPointerMove(evt){
  if(!dragging) return;
  const {nx, ny} = pointerPos(evt);
  updateStick(nx, ny, 'PANTALLA');
  evt.preventDefault();
}
function onPointerUp(evt){
  if(!dragging) return;
  dragging = false;
  resetStick('PANTALLA');
}

stickWrap.addEventListener('mousedown', onPointerDown);
window.addEventListener('mousemove', onPointerMove);
window.addEventListener('mouseup', onPointerUp);
stickWrap.addEventListener('touchstart', onPointerDown, {passive:false});
window.addEventListener('touchmove', onPointerMove, {passive:false});
window.addEventListener('touchend', onPointerUp);

// --- Entrada de teclado (pruebas en escritorio) ---
const keyState = {ArrowUp:false, ArrowDown:false, ArrowLeft:false, ArrowRight:false};
function keyboardToVector(){
  let nx = 0, ny = 0;
  if(keyState.ArrowUp) ny -= 1;
  if(keyState.ArrowDown) ny += 1;
  if(keyState.ArrowLeft) nx -= 1;
  if(keyState.ArrowRight) nx += 1;
  return {nx, ny};
}
window.addEventListener('keydown', (e)=>{
  if(!(e.key in keyState)) return;
  if(keyState[e.key]) return;
  keyState[e.key] = true;
  if(!padActive){
    const {nx, ny} = keyboardToVector();
    stickWrap.classList.add('active');
    updateStick(nx, ny, 'TECLADO');
  }
});
window.addEventListener('keyup', (e)=>{
  if(!(e.key in keyState)) return;
  keyState[e.key] = false;
  if(!padActive){
    const {nx, ny} = keyboardToVector();
    if(nx === 0 && ny === 0) resetStick('TECLADO');
    else updateStick(nx, ny, 'TECLADO');
  }
});

// ============================================================
// GAMEPAD (GameSir X5 Lite u otro mando estándar por USB-C)
// ============================================================
const padStatusEl = document.getElementById('padStatus');
const padLabelEl = document.getElementById('padLabel');
let padActive = false;
let padPrevButtons = [false, false];

window.addEventListener('gamepadconnected', (e)=>{
  padActive = true;
  padStatusEl.classList.add('on');
  padLabelEl.textContent = 'MANDO: ' + e.gamepad.id.slice(0,26);
  showToast('Mando conectado');
});
window.addEventListener('gamepaddisconnected', ()=>{
  padActive = false;
  padStatusEl.classList.remove('on');
  padLabelEl.textContent = 'SIN MANDO USB-C';
  resetStick('MANDO');
});

function pollGamepad(){
  const pads = navigator.getGamepads ? navigator.getGamepads() : [];
  const gp = pads && pads[0];
  if(gp){
    if(!padActive){
      padActive = true;
      padStatusEl.classList.add('on');
      padLabelEl.textContent = 'MANDO: ' + gp.id.slice(0,26);
    }
    const nx = gp.axes[0] || 0;
    const ny = gp.axes[1] || 0;
    stickWrap.classList.toggle('active', Math.hypot(nx,ny) > 0.05);
    if(Math.hypot(nx, ny) < 0.05){
      resetStick('MANDO');
    }else{
      updateStick(nx, ny, 'MANDO');
    }

    // Botones A (0) y B (1) -> AUX1 / AUX2, disparo por flanco de subida
    const btnA = !!(gp.buttons[0] && gp.buttons[0].pressed);
    const btnB = !!(gp.buttons[1] && gp.buttons[1].pressed);
    if(btnA && !padPrevButtons[0]) triggerAux(1);
    if(btnB && !padPrevButtons[1]) triggerAux(2);
    padPrevButtons = [btnA, btnB];
  }
  requestAnimationFrame(pollGamepad);
}
requestAnimationFrame(pollGamepad);

// ============================================================
// BOTONES AUX (futuras funciones — por ahora: iconos en la matriz LED)
// ============================================================
function triggerAux(n){
  const el = document.getElementById('aux' + n);
  el.style.borderColor = 'var(--accent)';
  setTimeout(()=> el.style.borderColor = '', 180);
  sendCommand(n === 1 ? 'C' : 'X', padActive ? 'MANDO' : 'PANTALLA');
}
document.getElementById('aux1').addEventListener('click', ()=> triggerAux(1));
document.getElementById('aux2').addEventListener('click', ()=> triggerAux(2));
</script>
</body>
</html>
